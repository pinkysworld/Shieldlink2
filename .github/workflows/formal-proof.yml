name: Formal proof

on:
  push:
    branches: [main, implementation-validation]
  pull_request:
  workflow_dispatch:

jobs:
  bounded-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys
      - name: Run bounded SAT proof
        run: bash formal/run_yosys_formal.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bounded-formal-results
          path: formal/out/
